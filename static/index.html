<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dashboard</title>
<style>
  :root{
    --bg: #F6F7F8;
    --panel: #FFFFFF;
    --panel-2: #FBFBFC;
    --hairline: #DFE3E8;
    --text: #1A1D24;
    --muted: #6B7280;
    --navy: #1E3A5F;
    --navy-soft: #E7EDF3;
    --rust: #C4571F;
    --rust-soft: #FBEAE0;
    --teal: #2F7A5C;
    --teal-soft: #E5F2ED;
    --slate: #4E7FB5;
    --radius: 10px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: var(--bg); color: var(--text);
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    min-height:100vh;
  }
  .wrap{max-width:1440px; margin:0 auto; padding:24px 20px 60px;}

  header{
    display:flex; align-items:flex-start; justify-content:space-between;
    padding-bottom:16px; margin-bottom:20px; border-bottom:2px solid var(--navy);
    flex-wrap:wrap; gap:14px;
  }
  .title-block h1{ font-size:21px; font-weight:700; margin:0 0 4px; color:var(--navy); letter-spacing:-0.01em; }
  .title-block p{ margin:0; color:var(--muted); font-size:12.5px; }

  .status-col{ display:flex; flex-direction:column; align-items:flex-end; gap:8px; font-size:12px; color:var(--muted); }
  .status-row{ display:flex; align-items:center; gap:8px; }
  .pulse{ width:7px; height:7px; border-radius:50%; background:var(--teal); flex:none; }
  .pulse.error{ background:#C0392B; }

  button{
    background: var(--panel); border:1px solid var(--hairline); color:var(--navy);
    font-family:inherit; font-size:12px; font-weight:600; padding:6px 12px; border-radius:7px;
    cursor:pointer;
  }
  button:hover{ border-color:var(--navy); background:var(--navy-soft); }
  button:disabled{ opacity:0.5; cursor:default; }
  input[type=file]{ font-size:11px; color:var(--muted); max-width:170px; }
  input[type=text]{
    font-family:inherit; font-size:13px; padding:8px 12px; border-radius:8px;
    border:1px solid var(--hairline); background:var(--panel); color:var(--text); width:280px;
  }
  input[type=text]:focus{ outline:2px solid var(--slate); outline-offset:1px; }

  .hierarchy-box{
    display:flex; align-items:center; gap:8px; background:var(--panel); border:1px solid var(--hairline);
    border-radius:8px; padding:6px 10px; font-size:11.5px;
  }

  /* KPI summary strip */
  .kpi-row{ display:grid; grid-template-columns:repeat(auto-fit, minmax(160px,1fr)); gap:12px; margin-bottom:20px; }
  .kpi-card{
    background:var(--panel); border:1px solid var(--hairline); border-radius:8px;
    padding:14px 16px 12px; border-top:3px solid var(--navy);
  }
  .kpi-card.rust{ border-top-color:var(--rust); }
  .kpi-card .label{ font-size:10.5px; color:var(--muted); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:6px; }
  .kpi-card .value{ font-family:Consolas,'Cascadia Mono',monospace; font-size:22px; font-weight:700; color:var(--text); font-variant-numeric:tabular-nums; }
  .kpi-card.rust .value{ color:var(--rust); }

  .tabs{ display:flex; gap:6px; margin-bottom:16px; flex-wrap:wrap; }
  .filter-row{ display:flex; justify-content:space-between; align-items:flex-start; gap:16px; flex-wrap:wrap; }
  .vertical-filter{ display:flex; align-items:center; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
  .vertical-filter label{ font-size:11px; text-transform:uppercase; letter-spacing:0.05em; color:var(--muted); font-weight:600; }
  .vertical-filter select{
    font-family:inherit; font-size:12.5px; font-weight:500; padding:7px 12px; border-radius:8px;
    border:1px solid var(--hairline); background:var(--panel); color:var(--navy); cursor:pointer;
  }
  .vertical-filter select:focus{ outline:2px solid var(--slate); outline-offset:1px; }
  .tab{
    padding:7px 14px; border-radius:8px; border:1px solid var(--hairline); background:var(--panel);
    color:var(--muted); font-size:12.5px; font-weight:600; cursor:pointer;
  }
  .tab.active{ background:var(--navy); color:#fff; border-color:var(--navy); }

  .tree-panel{ background:var(--panel); border:1px solid var(--hairline); border-radius:var(--radius); overflow:hidden; }
  .tree-header, .tree-row{
    display:grid; align-items:center;
    grid-template-columns: minmax(220px,2.2fr) 70px repeat(5, 100px);
    gap:6px; padding:9px 14px;
  }
  .tree-header{
    background:var(--panel-2); font-size:10.5px; text-transform:uppercase; letter-spacing:0.04em;
    color:var(--muted); border-bottom:1px solid var(--hairline); font-weight:600;
  }
  .tree-header .num, .tree-row .num{ text-align:right; }
  .tree-row{ border-bottom:1px solid #EEF0F2; font-size:13px; cursor:pointer; }
  .tree-row:hover{ background:var(--navy-soft); }
  .tree-row.dimmed{ opacity:0.35; }
  .tree-row .num{ font-family:Consolas,'Cascadia Mono',monospace; font-variant-numeric:tabular-nums; }
  .name-cell{ display:flex; align-items:center; gap:8px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .caret{ display:inline-block; width:12px; color:var(--muted); flex:none; }
  .depth-0{ font-weight:700; }
  .depth-0 .name-cell{ color:var(--navy); }
  .depth-1 .name-cell{ padding-left:20px; }
  .depth-2 .name-cell{ padding-left:40px; }
  .depth-3 .name-cell{ padding-left:60px; font-weight:400; }
  .depth-3{ cursor:pointer; }
  .depth-3:hover .name-cell{ color:var(--navy); text-decoration:underline; }
  .flag-badge{
    display:inline-block; background:var(--rust-soft); color:var(--rust); font-size:9.5px; font-weight:700;
    padding:2px 7px; border-radius:20px; margin-left:6px; flex:none; border:1px solid var(--rust);
  }
  .headcount-pill{ color:var(--muted); font-size:11px; }
  mark{ background:#FCE8B8; color:inherit; border-radius:2px; padding:0 1px; }

  .empty-cell{ color:#C7CBD1; }

  .modal-backdrop{
    position:fixed; inset:0; background:rgba(20,22,26,0.45); display:flex; align-items:center; justify-content:center;
    z-index:100; padding:20px;
  }
  .modal{
    background:var(--panel); border:1px solid var(--hairline); border-radius:var(--radius);
    max-width:720px; width:100%; max-height:85vh; overflow-y:auto; padding:22px 24px;
  }
  .modal h3{ margin:0 0 4px; font-size:17px; color:var(--navy); }
  .modal .sub{ color:var(--muted); font-size:12px; margin-bottom:16px; }
  .modal-section-label{
    font-size:11px; text-transform:uppercase; letter-spacing:0.05em; font-weight:700;
    color:var(--navy); margin:18px 0 8px; padding-bottom:4px; border-bottom:2px solid var(--navy-soft);
  }
  .modal-section-label:first-of-type{ margin-top:0; }
  .kv-grid{ display:grid; grid-template-columns:1fr 1fr; gap:8px 20px; }
  .kv-row{ display:flex; justify-content:space-between; gap:10px; padding:6px 0; border-bottom:1px solid #EEF0F2; font-size:12.5px; }
  .kv-row .k{ color:var(--muted); }
  .kv-row .v{ font-family:Consolas,monospace; font-variant-numeric:tabular-nums; text-align:right; }
  .modal-close{ float:right; }

  .error-banner{ text-align:center; padding:40px 20px; color:#C0392B; }
  .loading{ text-align:center; padding:40px 20px; color:var(--muted); }

  /* Hot Prospect funnel */
  .funnel-wrap{ margin-top:24px; }
  .funnel-header{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:14px; }
  .funnel-header h2{ font-size:15px; font-weight:700; color:var(--navy); margin:0; }
  .funnel-header .sub{ font-size:11.5px; color:var(--muted); }
  .funnel-unavailable{
    background:var(--panel); border:1px solid var(--hairline); border-radius:var(--radius);
    padding:30px; text-align:center; color:var(--muted); font-size:13px;
  }
  .funnel-stages{
    display:flex; flex-direction:column; gap:0; background:var(--panel); border:1px solid var(--hairline);
    border-radius:var(--radius); overflow:hidden; margin-bottom:16px;
  }
  .funnel-stage{
    display:flex; align-items:center; gap:16px; padding:14px 20px; border-bottom:1px solid #EEF0F2;
  }
  .funnel-stage:last-child{ border-bottom:none; }
  .funnel-bar-track{ flex:1; background:#EEF0F2; border-radius:6px; height:34px; position:relative; overflow:hidden; }
  .funnel-bar-fill{ background:var(--navy); height:100%; border-radius:6px 0 0 6px; transition:width 0.3s; }
  .funnel-stage-label{ width:220px; flex:none; font-size:12.5px; font-weight:600; color:var(--text); }
  .funnel-stage-value{
    width:110px; flex:none; text-align:right; font-family:Consolas,monospace; font-weight:700;
    font-size:15px; color:var(--navy); font-variant-numeric:tabular-nums;
  }
  .funnel-stage-pct{ width:90px; flex:none; text-align:right; font-family:Consolas,monospace; font-size:12px; color:var(--muted); }
  .funnel-cards{ display:grid; grid-template-columns:repeat(auto-fit, minmax(160px,1fr)); gap:12px; }
  .funnel-card{
    background:var(--panel); border:1px solid var(--hairline); border-radius:8px; padding:14px 16px;
    border-top:3px solid var(--slate);
  }
  .funnel-card .label{ font-size:10.5px; color:var(--muted); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:6px; }
  .funnel-card .value{ font-family:Consolas,monospace; font-size:20px; font-weight:700; color:var(--text); font-variant-numeric:tabular-nums; }

  @media (max-width: 900px){
    .tree-header, .tree-row{ grid-template-columns: minmax(160px,1.6fr) 50px repeat(5, 80px); font-size:11px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="title-block">
      <h1 id="dash-title">Dashboard</h1>
      <p>ZM → RM → Location → L1 performance register</p>
    </div>
    <div class="status-col">
      <div class="status-row">
        <span class="pulse" id="pulse-dot"></span>
        <span id="updated-text">connecting…</span>
        <button id="refresh">Refresh data</button>
      </div>
      <div class="hierarchy-box">
        <span id="hierarchy-status">hierarchy: —</span>
        <input type="file" id="hierarchy-file" accept=".xlsx" />
        <button id="hierarchy-upload">Upload weekly sheet</button>
      </div>
    </div>
  </header>

  <div class="filter-row">
    <div class="tabs" id="period-tabs"></div>
    <div class="vertical-filter">
      <label for="vertical-select">Vertical</label>
      <select id="vertical-select"><option value="all">All Verticals</option></select>
      <label for="zm-select">ZM</label>
      <select id="zm-select"><option value="all">All ZMs</option></select>
      <label for="rm-select">RM</label>
      <select id="rm-select"><option value="all">All RMs</option></select>
      <label for="location-select">Location</label>
      <select id="location-select"><option value="all">All Locations</option></select>
    </div>
  </div>

  <div id="funnel-panel"></div>

  <div id="content"><div class="loading">Loading…</div></div>
</div>

<div id="modal-root"></div>

<script>
function computeMonthLabels(){
  const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const now = new Date();
  const labels = {wtd:'WTD'};
  labels.mtd = monthNames[now.getMonth()];
  const d1 = new Date(now.getFullYear(), now.getMonth() - 1, 1);
  labels.m1 = monthNames[d1.getMonth()];
  return labels;
}
const PERIOD_LABELS = computeMonthLabels();

// Which raw Redash column feeds each employee-detail field, per period.
// null = genuinely not tracked at that granularity in the source query.
const PROFILE_FIELDS = [
  { key:'manager_name', label:'Manager Name' },
  { key:'_am', label:'Area Manager (AM)' },
  { key:'_rm', label:'Regional Manager (RM)' },
  { key:'_zm', label:'Zonal Manager (ZM)' },
  { key:'iil_comp_loc_name', label:'Location' },
  { key:'joiningdate', label:'Joining Date' },
  { key:'tenure', label:'Tenure' },
  { key:'tenure_bucket', label:'Tenure Bucket' },
];

const EMPLOYEE_PERIOD_FIELDS = {
  overall: { sales_count:'sales_done', sales_value:'annual_sale_done', hot_total:'l1_hot_glids', hot_self:'l1_hot_self_meet', hot_mgr:'l1_hot_with_mgr_meet', total_attempts:'total_attempts', unique_answered:'call_answered', talktime:'avg_daily_tt_hhmmss', total_meet:'total_meet', fresh_meet:'fresh_meet', followup_meet:'followup_meet', self_meet:'self_meet', with_mgr_meet:'with_mgr_meet', hl_assigned:'top3_hl_assigned', hl_done:'hl_meeting_done' },
  wtd: { sales_count:'week_sales_done', sales_value:'annual_week_sale_done', hot_total:'l1_hot_glids_wtd', hot_self:'l1_hot_self_meet_wtd', hot_mgr:'l1_hot_with_mgr_meet_wtd', total_attempts:'total_attempts_wtd', unique_answered:'call_answered_wtd', talktime:'avg_tt_hhmmss_wtd', total_meet:'total_meet_wtd', fresh_meet:'fresh_meet_wtd', followup_meet:'followup_meet_wtd', self_meet:'self_meet_wtd', with_mgr_meet:'with_mgr_meet_wtd', hl_assigned:'top3_hl_wtd', hl_done:'hl_meeting_done_wtd' },
  mtd: { sales_count:'month_sales_done', sales_value:'annual_month_sale_done', hot_total:'l1_hot_glids_mtd', hot_self:'l1_hot_self_meet_mtd', hot_mgr:'l1_hot_with_mgr_meet_mtd', total_attempts:'total_attempts_mtd', unique_answered:'call_answered_mtd', talktime:'avg_tt_hhmmss_mtd', total_meet:'total_meet_mtd', fresh_meet:'fresh_meet_mtd', followup_meet:'followup_meet_mtd', self_meet:'self_meet_mtd', with_mgr_meet:'with_mgr_meet_mtd', hl_assigned:'top3_hl_mtd', hl_done:'hl_meeting_done_mtd' },
  m1: { sales_count:'sales_done_m1', sales_value:'annual_sale_done_m1', hot_total:'l1_hot_glids_m1', hot_self:'l1_hot_self_meet_m1', hot_mgr:'l1_hot_with_mgr_meet_m1', total_attempts:'total_attempts_m1', unique_answered:'call_answered_m1', talktime:'avg_tt_hhmmss_m1', total_meet:'total_meet_m1', fresh_meet:'fresh_meet_m1', followup_meet:'followup_meet_m1', self_meet:'self_meet_m1', with_mgr_meet:'with_mgr_meet_m1', hl_assigned:'top3_hl_m1', hl_done:'hl_meeting_done_m1' },
  m2: { sales_count:'sales_done_m2', sales_value:'annual_sale_done_m2', hot_total:null, hot_self:null, hot_mgr:null, total_attempts:null, unique_answered:null, talktime:null, total_meet:'total_meet_m2', fresh_meet:'fresh_meet_m2', followup_meet:'followup_meet_m2', self_meet:'self_meet_m2', with_mgr_meet:'with_mgr_meet_m2', hl_assigned:'top3_hl_m2', hl_done:'hl_meeting_done_m2' },
  m3: { sales_count:'sales_done_m3', sales_value:'annual_sale_done_m3', hot_total:null, hot_self:null, hot_mgr:null, total_attempts:null, unique_answered:null, talktime:null, total_meet:'total_meet_m3', fresh_meet:'fresh_meet_m3', followup_meet:'followup_meet_m3', self_meet:'self_meet_m3', with_mgr_meet:'with_mgr_meet_m3', hl_assigned:'top3_hl_m3', hl_done:'hl_meeting_done_m3' },
  m4: { sales_count:'sales_done_m4', sales_value:'annual_sale_done_m4', hot_total:null, hot_self:null, hot_mgr:null, total_attempts:null, unique_answered:null, talktime:null, total_meet:'total_meet_m4', fresh_meet:'fresh_meet_m4', followup_meet:'followup_meet_m4', self_meet:'self_meet_m4', with_mgr_meet:'with_mgr_meet_m4', hl_assigned:'top3_hl_m4', hl_done:'hl_meeting_done_m4' },
};
let currentPeriod = 'wtd';
let currentVertical = 'all';
let dashboardData = null;
let expanded = { zm: new Set(), rm: new Set(), loc: new Set() };
let searchTerm = '';

const contentEl = document.getElementById('content');
const updatedTextEl = document.getElementById('updated-text');
const pulseDot = document.getElementById('pulse-dot');
const refreshBtn = document.getElementById('refresh');
const titleEl = document.getElementById('dash-title');
const tabsEl = document.getElementById('period-tabs');
const verticalSelectEl = document.getElementById('vertical-select');
const hierarchyStatusEl = document.getElementById('hierarchy-status');
const hierarchyUploadBtn = document.getElementById('hierarchy-upload');
const hierarchyFileInput = document.getElementById('hierarchy-file');
const zmSelectEl = document.getElementById('zm-select');
const rmSelectEl = document.getElementById('rm-select');
const locationSelectEl = document.getElementById('location-select');
let currentZmFilter = 'all';
let currentRmFilter = 'all';
let currentLocationFilter = 'all';

function relativeTime(ts){
  if(!ts) return 'never';
  const diff = Math.max(0, (Date.now()/1000) - ts);
  if(diff < 60) return 'just now';
  if(diff < 3600) return Math.floor(diff/60) + ' min ago';
  if(diff < 86400) return Math.floor(diff/3600) + ' hr ago';
  return Math.floor(diff/86400) + ' day(s) ago';
}
function fmtNum(v){
  if(v === null || v === undefined) return '—';
  return Number(v).toLocaleString('en-IN', {maximumFractionDigits:0});
}
function fmtCurrency(v){
  if(v === null || v === undefined) return '—';
  return '₹' + Number(v).toLocaleString('en-IN', {maximumFractionDigits:0});
}
function hasHotFields(period){ return ['overall','wtd','mtd','m1'].includes(period); }

function buildTabs(){
  tabsEl.innerHTML = '';
  Object.entries(PERIOD_LABELS).forEach(([key,label]) => {
    const tab = document.createElement('div');
    tab.className = 'tab' + (key === currentPeriod ? ' active' : '');
    tab.textContent = label;
    tab.addEventListener('click', () => { currentPeriod = key; renderAll(); });
    tabsEl.appendChild(tab);
  });
}

function renderAll(){
  buildTabs();
  populateHierarchyFilters();
  renderTree();
  renderFunnel();
}

function populateHierarchyFilters(){
  const tree = dashboardData.tree;

  // ZM options: always every ZM present in the (vertical-filtered-by-backend) tree.
  const zmNames = new Set(Object.keys(tree));

  // RM options: only RMs under the currently selected ZM (if any); all RMs otherwise.
  const rmNames = new Set();
  Object.entries(tree).forEach(([zm, zmNode]) => {
    if(currentZmFilter !== 'all' && zm !== currentZmFilter) return;
    Object.keys(zmNode.rm_children).forEach(rm => rmNames.add(rm));
  });

  // Location options: only locations under the currently selected ZM *and* RM.
  const locationNames = new Set();
  Object.entries(tree).forEach(([zm, zmNode]) => {
    if(currentZmFilter !== 'all' && zm !== currentZmFilter) return;
    Object.entries(zmNode.rm_children).forEach(([rm, rmNode]) => {
      if(currentRmFilter !== 'all' && rm !== currentRmFilter) return;
      Object.keys(rmNode.location_children).forEach(loc => locationNames.add(loc));
    });
  });

  function refill(selectEl, names, allLabel, onReset){
    const current = selectEl.value || 'all';
    const sorted = [...names].sort();
    selectEl.innerHTML = `<option value="all">${allLabel}</option>` +
      sorted.map(n => `<option value="${escAttr(n)}">${escHtml(n)}</option>`).join('');
    // If the previously-selected value no longer exists under the new
    // parent filter, reset it to "all" — and sync the underlying state
    // variable too, since setting .value here doesn't fire a change event.
    if(sorted.includes(current)){
      selectEl.value = current;
    } else {
      selectEl.value = 'all';
      if(current !== 'all' && onReset) onReset();
    }
  }
  refill(zmSelectEl, zmNames, 'All ZMs');
  refill(rmSelectEl, rmNames, 'All RMs', () => { currentRmFilter = 'all'; });
  refill(locationSelectEl, locationNames, 'All Locations', () => { currentLocationFilter = 'all'; });
}

// ---------------------------------------------------------------------
// Top-ZM bar chart
// ---------------------------------------------------------------------
function sumChildMetrics(children){
  const allPeriods = ['overall','wtd','mtd','m1','m2','m3','m4'];
  const metrics = {};
  let headcount = 0;
  Object.values(children).forEach(child => { headcount += child.headcount; });
  for(const period of allPeriods){
    const agg = { sales_count:0, sales_value:0, total_meet:0 };
    let hasHot = false;
    let hasFunnel = false;
    Object.values(children).forEach(child => {
      const m = child.metrics[period];
      if(!m) return;
      agg.sales_count += m.sales_count || 0;
      agg.sales_value += m.sales_value || 0;
      agg.total_meet += m.total_meet || 0;
      if('hot_total' in m){
        hasHot = true;
        agg.hot_total = (agg.hot_total||0) + (m.hot_total||0);
        agg.hot_self = (agg.hot_self||0) + (m.hot_self||0);
        agg.hot_mgr = (agg.hot_mgr||0) + (m.hot_mgr||0);
      }
      if('hp_converted' in m){
        hasFunnel = true;
        agg.hp_converted = (agg.hp_converted||0) + (m.hp_converted||0);
        agg.hp_converted_met = (agg.hp_converted_met||0) + (m.hp_converted_met||0);
        agg.hp_tp_sum_met = (agg.hp_tp_sum_met||0) + (m.hp_tp_sum_met||0);
        agg.hp_tp_over_200 = (agg.hp_tp_over_200||0) + (m.hp_tp_over_200||0);
        agg.working_days = (agg.working_days||0) + (m.working_days||0);
      }
    });
    metrics[period] = agg;
  }
  return { metrics, headcount };
}

function getFilteredTree(){
  const tree = dashboardData.tree;
  const noFilter = currentZmFilter === 'all' && currentRmFilter === 'all' && currentLocationFilter === 'all';
  if(noFilter) return tree;

  const result = {};
  for(const [zm, zmNode] of Object.entries(tree)){
    if(currentZmFilter !== 'all' && zm !== currentZmFilter) continue;

    const rmChildren = {};
    for(const [rm, rmNode] of Object.entries(zmNode.rm_children)){
      if(currentRmFilter !== 'all' && rm !== currentRmFilter) continue;

      const locationChildren = {};
      for(const [loc, locNode] of Object.entries(rmNode.location_children)){
        if(currentLocationFilter !== 'all' && loc !== currentLocationFilter) continue;
        locationChildren[loc] = locNode;
      }
      if(Object.keys(locationChildren).length === 0) continue;
      const locationFiltered = currentLocationFilter !== 'all';
      const { metrics, headcount } = locationFiltered ? sumChildMetrics(locationChildren) : { metrics: rmNode.metrics, headcount: rmNode.headcount };
      rmChildren[rm] = { metrics, headcount, location_children: locationChildren };
    }
    if(Object.keys(rmChildren).length === 0) continue;
    const rmOrLocFiltered = currentRmFilter !== 'all' || currentLocationFilter !== 'all';
    const { metrics, headcount } = rmOrLocFiltered ? sumChildMetrics(rmChildren) : { metrics: zmNode.metrics, headcount: zmNode.headcount };
    result[zm] = { metrics, headcount, rm_children: rmChildren };
  }
  return result;
}


// ---------------------------------------------------------------------
// Tree rendering, with search-driven auto-expand + highlight + dimming
// ---------------------------------------------------------------------
function metricCells(metrics, period){
  const showHot = hasHotFields(period);
  const cells = [ fmtNum(metrics.sales_count) ];
  if(showHot){
    cells.push(fmtNum(metrics.hot_total), fmtNum(metrics.hot_self), fmtNum(metrics.hot_mgr));
  } else {
    cells.push('<span class="empty-cell">—</span>','<span class="empty-cell">—</span>','<span class="empty-cell">—</span>');
  }
  cells.push(fmtNum(metrics.total_meet));
  return cells;
}
function escHtml(s){ return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// ---------------------------------------------------------------------
// Hot Prospect funnel — only exists for WTD/MTD/M1 (per the underlying
// Redash query's scope). Reflects whatever ZM/RM/Location/Vertical filters
// are currently applied, summed across the filtered tree.
// ---------------------------------------------------------------------
const FUNNEL_PERIODS = ['wtd', 'mtd', 'm1'];

function fmtPctSimple(numerator, denominator){
  const n = Number(numerator) || 0;
  const d = Number(denominator) || 0;
  if(d === 0) return '—';
  return (n / d * 100).toFixed(1) + '%';
}
function fmtRatio(numerator, denominator, decimals){
  const n = Number(numerator) || 0;
  const d = Number(denominator) || 0;
  if(d === 0) return '—';
  return (n / d).toFixed(decimals === undefined ? 1 : decimals);
}

function renderFunnel(){
  const panel = document.getElementById('funnel-panel');

  if(!FUNNEL_PERIODS.includes(currentPeriod)){
    panel.innerHTML = `
      <div class="funnel-wrap">
        <div class="funnel-header"><h2>Hot Prospect Funnel</h2></div>
        <div class="funnel-unavailable">This funnel is only available on the WTD, ${PERIOD_LABELS.mtd}, and ${PERIOD_LABELS.m1} tabs.</div>
      </div>`;
    return;
  }

  const tree = getFilteredTree();
  const totals = { hot_total:0, hot_mgr:0, hp_converted:0, hp_converted_met:0, hp_tp_sum_met:0, hp_tp_over_200:0, total_meet:0, working_days:0, sales_count:0, sales_value:0 };
  Object.values(tree).forEach(zm => {
    const m = zm.metrics[currentPeriod];
    if(!m) return;
    totals.hot_total += m.hot_total || 0;
    totals.hot_mgr += m.hot_mgr || 0;
    totals.hp_converted += m.hp_converted || 0;
    totals.hp_converted_met += m.hp_converted_met || 0;
    totals.hp_tp_sum_met += m.hp_tp_sum_met || 0;
    totals.hp_tp_over_200 += m.hp_tp_over_200 || 0;
    totals.total_meet += m.total_meet || 0;
    totals.working_days += m.working_days || 0;
    totals.sales_count += m.sales_count || 0;
    totals.sales_value += m.sales_value || 0;
  });

  const stages = [
    { label: 'Hot Prospects (L1)', value: totals.hot_total, pct: null },
    { label: 'L2 Met', value: totals.hot_mgr, pct: fmtPctSimple(totals.hot_mgr, totals.hot_total) },
    { label: 'Converted (of all HP)', value: totals.hp_converted, pct: fmtPctSimple(totals.hp_converted, totals.hot_total) },
    { label: 'Converted (of L2 Met)', value: totals.hp_converted_met, pct: fmtPctSimple(totals.hp_converted_met, totals.hot_mgr) },
  ];
  const maxVal = Math.max(1, totals.hot_total);

  const cards = [
    { label: 'Avg Daily Meetings', value: fmtRatio(totals.total_meet, totals.working_days) },
    { label: 'Total Sales', value: fmtNum(totals.sales_count) },
    { label: 'Annual Sales', value: fmtNum(totals.sales_value) },
    { label: '% of HP with TP > 200', value: fmtPctSimple(totals.hp_tp_over_200, totals.hot_total) },
  ];

  panel.innerHTML = `
    <div class="funnel-wrap">
      <div class="funnel-header">
        <h2>Hot Prospect Funnel</h2>
        <span class="sub">${escHtml(PERIOD_LABELS[currentPeriod])} — reflects current ZM/RM/Location/Vertical filters</span>
      </div>
      <div class="funnel-stages">
        ${stages.map(s => `
          <div class="funnel-stage">
            <div class="funnel-stage-label">${escHtml(s.label)}</div>
            <div class="funnel-bar-track"><div class="funnel-bar-fill" style="width:${Math.max(2, (s.value/maxVal*100))}%"></div></div>
            <div class="funnel-stage-value">${fmtNum(s.value)}</div>
            <div class="funnel-stage-pct">${s.pct ?? ''}</div>
          </div>
        `).join('')}
      </div>
      <div class="funnel-cards">
        ${cards.map(c => `<div class="funnel-card"><div class="label">${escHtml(c.label)}</div><div class="value">${c.value}</div></div>`).join('')}
      </div>
    </div>`;
}

function escAttr(s){ return escHtml(s).replace(/"/g,'&quot;'); }
function titleCase(s){ return String(s).replace(/[_\-]+/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

function highlightMatch(name){
  if(!searchTerm) return escHtml(name);
  const idx = String(name).toLowerCase().indexOf(searchTerm.toLowerCase());
  if(idx === -1) return escHtml(name);
  const s = String(name);
  return escHtml(s.slice(0,idx)) + '<mark>' + escHtml(s.slice(idx, idx+searchTerm.length)) + '</mark>' + escHtml(s.slice(idx+searchTerm.length));
}
function matches(name){
  if(!searchTerm) return false;
  return String(name||'').toLowerCase().includes(searchTerm.toLowerCase());
}

function renderTree(){
  const tree = getFilteredTree();
  const showHot = hasHotFields(currentPeriod);
  const searching = searchTerm.length > 0;

  // When searching, auto-expand every branch that contains a match so the
  // person doesn't have to manually click through the hierarchy.
  if(searching){
    for(const [zm, zmNode] of Object.entries(tree)){
      let zmHasMatch = matches(zm);
      for(const [rm, rmNode] of Object.entries(zmNode.rm_children)){
        let rmHasMatch = matches(rm);
        for(const [loc, locNode] of Object.entries(rmNode.location_children)){
          const locHasMatch = matches(loc) || locNode.employees.some(e => matches(e.name));
          if(locHasMatch){ expanded.loc.add(zm+'||'+rm+'||'+loc); rmHasMatch = true; }
        }
        if(rmHasMatch){ expanded.rm.add(zm+'||'+rm); zmHasMatch = true; }
      }
      if(zmHasMatch) expanded.zm.add(zm);
    }
  }

  let html = `<div class="tree-panel">`;
  html += `<div class="tree-header">
    <div>Name</div><div class="num">HC</div>
    <div class="num">Sales #</div>
    <div class="num">${showHot ? 'Hot Total' : 'Meetings'}</div>
    <div class="num">${showHot ? 'Hot Self' : ''}</div>
    <div class="num">${showHot ? 'Hot Mgr' : ''}</div>
    <div class="num">${showHot ? 'Total Meet' : ''}</div>
  </div>`;

  const zmNames = Object.keys(tree).sort((a,b) => tree[b].headcount - tree[a].headcount);
  for(const zm of zmNames){
    const zmNode = tree[zm];
    const zmKey = zm;
    const zmOpen = expanded.zm.has(zmKey) || (searching && matches(zm));
    const zmDim = searching && !matches(zm) && !zmOpen;
    const cells = metricCells(zmNode.metrics[currentPeriod], currentPeriod);
    html += `<div class="tree-row depth-0 ${zmDim?'dimmed':''}" data-toggle="zm" data-key="${escAttr(zmKey)}">
      <div class="name-cell"><span class="caret">${zmOpen?'▼':'▶'}</span>${highlightMatch(zm)} <span class="headcount-pill">(${zmNode.headcount})</span></div>
      <div class="num">${zmNode.headcount}</div>
      ${cells.map(c=>`<div class="num">${c}</div>`).join('')}
    </div>`;

    if(zmOpen){
      const rmNames = Object.keys(zmNode.rm_children).sort((a,b) => zmNode.rm_children[b].headcount - zmNode.rm_children[a].headcount);
      for(const rm of rmNames){
        const rmNode = zmNode.rm_children[rm];
        const rmKey = zmKey + '||' + rm;
        const rmOpen = expanded.rm.has(rmKey) || (searching && matches(rm));
        const rmDim = searching && !matches(rm) && !rmOpen;
        const rcells = metricCells(rmNode.metrics[currentPeriod], currentPeriod);
        html += `<div class="tree-row depth-1 ${rmDim?'dimmed':''}" data-toggle="rm" data-key="${escAttr(rmKey)}">
          <div class="name-cell"><span class="caret">${rmOpen?'▼':'▶'}</span>${highlightMatch(rm)} <span class="headcount-pill">(${rmNode.headcount})</span></div>
          <div class="num">${rmNode.headcount}</div>
          ${rcells.map(c=>`<div class="num">${c}</div>`).join('')}
        </div>`;

        if(rmOpen){
          const locNames = Object.keys(rmNode.location_children).sort((a,b) => rmNode.location_children[b].headcount - rmNode.location_children[a].headcount);
          for(const loc of locNames){
            const locNode = rmNode.location_children[loc];
            const locKey = rmKey + '||' + loc;
            const locOpen = expanded.loc.has(locKey) || (searching && matches(loc));
            const locDim = searching && !matches(loc) && !locOpen;
            const lcells = metricCells(locNode.metrics[currentPeriod], currentPeriod);
            html += `<div class="tree-row depth-2 ${locDim?'dimmed':''}" data-toggle="loc" data-key="${escAttr(locKey)}">
              <div class="name-cell"><span class="caret">${locOpen?'▼':'▶'}</span>${highlightMatch(loc)} <span class="headcount-pill">(${locNode.headcount})</span></div>
              <div class="num">${locNode.headcount}</div>
              ${lcells.map(c=>`<div class="num">${c}</div>`).join('')}
            </div>`;

            if(locOpen){
              const emps = [...locNode.employees].sort((a,b) => (b.flagged - a.flagged));
              for(const emp of emps){
                const empDim = searching && !matches(loc) && !matches(rm) && !matches(zm) && !matches(emp.name);
                html += `<div class="tree-row depth-3 ${empDim?'dimmed':''}" data-employee="${escAttr(emp.id)}">
                  <div class="name-cell">${highlightMatch(emp.name || emp.id)} ${emp.flagged ? '<span class="flag-badge">LOW</span>' : ''}</div>
                  <div class="num"></div><div class="num"></div><div class="num"></div><div class="num"></div><div class="num"></div><div class="num"></div>
                </div>`;
              }
            }
          }
        }
      }
    }
  }
  html += `</div>`;
  contentEl.innerHTML = html;

  contentEl.querySelectorAll('[data-toggle]').forEach(el => {
    el.addEventListener('click', () => {
      const level = el.dataset.toggle;
      const key = el.dataset.key;
      if(expanded[level].has(key)) expanded[level].delete(key);
      else expanded[level].add(key);
      renderTree();
    });
  });
  contentEl.querySelectorAll('[data-employee]').forEach(el => {
    el.addEventListener('click', () => openEmployeeModal(el.dataset.employee));
  });
}

// (Search panel removed — search-box no longer exists in the DOM.)

// ---------------------------------------------------------------------
// Employee detail modal — Profile (period-independent) + Performance
// section filtered to whichever period tab is currently selected.
// ---------------------------------------------------------------------
function fmtPct(numerator, denominator){
  const n = Number(numerator) || 0;
  const d = Number(denominator) || 0;
  if(d === 0) return '—';
  return (n / d * 100).toFixed(1) + '%';
}
function fieldRow(label, value){
  const display = (value === null || value === undefined || value === '') ? '—' : value;
  return `<div class="kv-row"><span class="k">${escHtml(label)}</span><span class="v">${escHtml(display)}</span></div>`;
}
function notTrackedRow(label){
  return `<div class="kv-row"><span class="k">${escHtml(label)}</span><span class="v empty-cell">Not tracked at this period</span></div>`;
}

function buildEmployeeDetailHtml(emp, period){
  const fields = EMPLOYEE_PERIOD_FIELDS[period];
  const get = (col) => col ? emp[col] : undefined;

  let profileRows = PROFILE_FIELDS.map(f => fieldRow(f.label, emp[f.key])).join('');

  const perfRows = [];
  perfRows.push(fieldRow('Sales (count)', fmtNum(get(fields.sales_count))));

  if(fields.hot_total !== null){
    perfRows.push(fieldRow('Hot Prospects Added', fmtNum(get(fields.hot_total))));
    perfRows.push(fieldRow('Hot Meetings — Self', fmtNum(get(fields.hot_self))));
    perfRows.push(fieldRow('Hot Meetings — With Manager', fmtNum(get(fields.hot_mgr))));
  } else {
    perfRows.push(notTrackedRow('Hot Prospects Added'));
    perfRows.push(notTrackedRow('Hot Meetings — Self'));
    perfRows.push(notTrackedRow('Hot Meetings — With Manager'));
  }

  if(fields.total_attempts !== null){
    perfRows.push(fieldRow('Total Attempts', fmtNum(get(fields.total_attempts))));
    perfRows.push(fieldRow('Unique Answered', fmtNum(get(fields.unique_answered))));
    perfRows.push(fieldRow('Avg Talktime', get(fields.talktime)));
  } else {
    perfRows.push(notTrackedRow('Total Attempts'));
    perfRows.push(notTrackedRow('Unique Answered'));
    perfRows.push(notTrackedRow('Avg Talktime'));
  }

  const totalMeet = get(fields.total_meet);
  const freshCount = get(fields.fresh_meet);
  const followupCount = get(fields.followup_meet);
  perfRows.push(fieldRow('Total Meetings', fmtNum(totalMeet)));
  perfRows.push(fieldRow('Fresh Meetings', `${fmtNum(freshCount)} (${fmtPct(freshCount, totalMeet)})`));
  perfRows.push(fieldRow('Followup Meetings', `${fmtNum(followupCount)} (${fmtPct(followupCount, totalMeet)})`));
  perfRows.push(fieldRow('Meetings — Self', fmtNum(get(fields.self_meet))));
  perfRows.push(fieldRow('Meetings — With Manager', fmtNum(get(fields.with_mgr_meet))));
  perfRows.push(fieldRow('HL Assigned', fmtNum(get(fields.hl_assigned))));
  perfRows.push(fieldRow('HL Meetings Done', fmtNum(get(fields.hl_done))));

  return `
    <div class="modal-section-label">Profile</div>
    <div class="kv-grid">${profileRows}</div>
    <div class="modal-section-label">Performance — ${PERIOD_LABELS[period]}</div>
    <div class="kv-grid">${perfRows.join('')}</div>
  `;
}

async function openEmployeeModal(employeeId){
  const root = document.getElementById('modal-root');
  root.innerHTML = `<div class="modal-backdrop"><div class="modal"><div class="loading">Loading employee detail…</div></div></div>`;
  root.querySelector('.modal-backdrop').addEventListener('click', (e) => {
    if(e.target.classList.contains('modal-backdrop')) root.innerHTML = '';
  });
  try{
    const res = await fetch(`/api/employee/${encodeURIComponent(employeeId)}?vertical=${encodeURIComponent(currentVertical)}`);
    const payload = await res.json();
    if(!payload.ok){
      root.querySelector('.modal').innerHTML = `<button class="modal-close" onclick="document.getElementById('modal-root').innerHTML=''">Close</button><div class="error-banner">${escHtml(payload.error)}</div>`;
      return;
    }
    const emp = payload.employee;
    const name = emp.employeename || employeeId;
    root.querySelector('.modal').innerHTML = `
      <button class="modal-close" id="modal-close-btn">Close</button>
      <h3>${escHtml(name)}</h3>
      <div class="sub">Employee ID: ${escHtml(employeeId)} — showing ${escHtml(PERIOD_LABELS[currentPeriod])} figures; switch the period tab behind this panel to see a different period next time you open it</div>
      ${buildEmployeeDetailHtml(emp, currentPeriod)}
    `;
    document.getElementById('modal-close-btn').addEventListener('click', () => { root.innerHTML=''; });
  } catch(e){
    root.querySelector('.modal').innerHTML = `<div class="error-banner">Connection error loading employee detail.</div>`;
  }
}

// ---------------------------------------------------------------------
// Data fetching
// ---------------------------------------------------------------------
async function fetchDashboard(force){
  refreshBtn.disabled = true;
  try{
    const params = new URLSearchParams();
    if(force) params.set('refresh', '1');
    params.set('vertical', currentVertical);
    const res = await fetch('/api/dashboard-data?' + params.toString(), { headers: {'Accept-Encoding':'gzip'} });
    const payload = await res.json();
    if(!payload.ok){
      pulseDot.className = 'pulse error';
      contentEl.innerHTML = `<div class="error-banner">Couldn't load data.<br><code>${escHtml(payload.error)}</code></div>`;
      updatedTextEl.textContent = 'error';
      return;
    }
    pulseDot.className = 'pulse';
    dashboardData = payload;
    titleEl.textContent = payload.title || 'Dashboard';
    updatedTextEl.textContent = 'data as of ' + relativeTime(payload.redash_cached_at);
    hierarchyStatusEl.textContent = payload.hierarchy_row_count
      ? `hierarchy: ${payload.hierarchy_row_count} L1s, updated ${relativeTime(payload.hierarchy_uploaded_at)}`
      : 'hierarchy: not uploaded yet';
    if(payload.unmapped_count > 0){
      hierarchyStatusEl.textContent += ` (${payload.unmapped_count} unmapped)`;
    }
    if(payload.ambiguous_locations && payload.ambiguous_locations.length > 0){
      hierarchyStatusEl.textContent += ` — ⚠ ${payload.ambiguous_locations.length} location(s) appear under multiple RMs, using summed figures for those: ${payload.ambiguous_locations.slice(0,5).join(', ')}${payload.ambiguous_locations.length > 5 ? '…' : ''}`;
    }
    if(payload.available_verticals){
      const current = verticalSelectEl.value;
      verticalSelectEl.innerHTML = '<option value="all">All Verticals</option>' +
        payload.available_verticals.map(v => `<option value="${escAttr(v.value)}">${escHtml(v.label)}</option>`).join('');
      verticalSelectEl.value = current || 'all';
    }
    renderAll();
  } catch(e){
    pulseDot.className = 'pulse error';
    updatedTextEl.textContent = 'connection error';
  } finally {
    refreshBtn.disabled = false;
  }
}

refreshBtn.addEventListener('click', () => fetchDashboard(true));
verticalSelectEl.addEventListener('change', (e) => {
  currentVertical = e.target.value;
  fetchDashboard(false);
});
zmSelectEl.addEventListener('change', (e) => {
  currentZmFilter = e.target.value;
  populateHierarchyFilters();
  renderTree();
  renderFunnel();
});
rmSelectEl.addEventListener('change', (e) => {
  currentRmFilter = e.target.value;
  populateHierarchyFilters();
  renderTree();
  renderFunnel();
});
locationSelectEl.addEventListener('change', (e) => {
  currentLocationFilter = e.target.value;
  renderTree();
  renderFunnel();
});

hierarchyUploadBtn.addEventListener('click', async () => {
  const file = hierarchyFileInput.files[0];
  if(!file){ alert('Choose the weekly .xlsx file first.'); return; }
  hierarchyUploadBtn.disabled = true;
  hierarchyUploadBtn.textContent = 'Uploading…';
  try{
    const formData = new FormData();
    formData.append('file', file);
    const res = await fetch('/api/upload-hierarchy', { method:'POST', body: formData });
    const payload = await res.json();
    if(!payload.ok){
      alert('Upload failed: ' + payload.error);
    } else {
      hierarchyFileInput.value = '';
      await fetchDashboard(false);
    }
  } catch(e){
    alert('Upload failed: connection error.');
  } finally {
    hierarchyUploadBtn.disabled = false;
    hierarchyUploadBtn.textContent = 'Upload weekly sheet';
  }
});

fetchDashboard(false);
setInterval(() => fetchDashboard(false), 5 * 60 * 1000);
